<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background: #fff;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 12px 0;
      color: #24292e;
    }
    .section {
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e1e4e8;
    }
    .section:last-child {
      border-bottom: none;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #586069;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      font-size: 13px;
      box-sizing: border-box;
      font-family: monospace;
    }
    input:focus {
      outline: none;
      border-color: #0366d6;
      box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.1);
    }
    button {
      background: #28a745;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-bottom: 8px;
    }
    button:hover {
      background: #218838;
    }
    button.secondary {
      background: #6a737d;
    }
    button.secondary:hover {
      background: #586069;
    }
    .status {
      font-size: 12px;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      display: none;
    }
    .status.success {
      display: block;
      background: #deffb3;
      color: #033a16;
      border: 1px solid #34d399;
    }
    .status.error {
      display: block;
      background: #ffdddd;
      color: #65030a;
      border: 1px solid #f97316;
    }
    .status.info {
      display: block;
      background: #e3f2fd;
      color: #0d47a1;
      border: 1px solid #2196f3;
    }
    .info-text {
      font-size: 12px;
      color: #586069;
      line-height: 1.5;
      margin-top: 8px;
    }
    a {
      color: #0366d6;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .cache-info {
      font-size: 11px;
      color: #6a737d;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>🔍 AgentScan</h1>

  <div class="section">
    <label>GitHub Personal Access Token</label>
    <input 
      type="password" 
      id="tokenInput" 
      placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxx"
      autocomplete="off"
    >
    <div class="info-text">
      Create a token with no permissions at <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a>
    </div>
  </div>

  <div class="section">
    <button id="saveBtn">Save Token</button>
    <button class="secondary" id="clearBtn">Clear Token</button>
    <div id="status" class="status"></div>
    <div class="cache-info">
      Using cache: 24-hour duration per user
    </div>
  </div>

  <div class="section">
    <div class="info-text">
      <strong>Why a token?</strong><br>
      • Unauthenticated: 60 requests/hour<br>
      • Authenticated: 5,000 requests/hour<br>
      • Your token stays private in your browser
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
